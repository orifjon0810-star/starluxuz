<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarLux - Admin Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg-color: #1a1a2e; --card-bg: #16213e; --text-color: #ffffff; --accent-color: #0f3460; --success-color: #28a745; --danger-color: #dc3545; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; }
        .header { text-align: center; padding-bottom: 15px; border-bottom: 2px solid var(--accent-color); margin-bottom: 20px; }
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #2d4059; }
        .info-row { margin: 10px 0; font-size: 15px; display: flex; justify-content: space-between; border-bottom: 1px dashed #2d4059; padding-bottom: 6px; }
        .info-value { font-weight: bold; color: #00fff0; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; color: white; }
        .btn-success { background-color: var(--success-color); }
        .btn-danger { background-color: var(--danger-color); }
    </style>
</head>
<body>

    <div class="header">
        <h2>⚙️ StarLux Admin Panel</h2>
    </div>

    <div class="card">
        <div style="font-weight: bold; color: #ffde7d; margin-bottom: 15px;">💳 Kelib tushgan so'rov:</div>
        
        <div class="info-row">
            <span>Foydalanuvchi ID:</span>
            <span class="info-value" id="user-id">-</span>
        </div>
        <div class="info-row">
            <span>Telegram Username:</span>
            <span class="info-value" style="color: #ffde7d;" id="user-username">@</span>
        </div>
        <div class="info-row">
            <span>Tasdiqlanadigan Summa:</span>
            <span class="info-value" style="color: #28a745;" id="payment-amount">0 so'm</span>
        </div>

        <div class="btn-group">
            <button class="btn-success" onclick="processPayment('ok')">✅ Ruxsat berish (+)</button>
            <button class="btn-danger" onclick="processPayment('no')">❌ Rad etish</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('user_id');
        const urlUsername = urlParams.get('username');
        const urlAmount = urlParams.get('amount');

        if(urlUserId) document.getElementById('user-id').innerText = urlUserId;
        if(urlUsername) document.getElementById('user-username').innerText = decodeURIComponent(urlUsername);
        if(urlAmount) document.getElementById('payment-amount').innerText = parseInt(urlAmount).toLocaleString() + " so'm";

        function processPayment(status) {
            const userId = document.getElementById('user-id').innerText;
            const amountRaw = document.getElementById('payment-amount').innerText;
            const amount = amountRaw.replace(/[^0-9]/g, '');

            const resultData = {
                action: "admin_decision",
                status: status,
                user_id: parseInt(userId),
                amount: parseInt(amount)
            };

            tg.sendData(JSON.stringify(resultData));
            tg.close();
        }
    </script>
</body>
</html>
