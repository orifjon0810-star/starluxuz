<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarLux Admin Panel</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: sans-serif; background: #0a0a1a; color: #e8d5a3; padding: 20px; text-align: center; }
    .card { background: #1a1f5e; padding: 20px; border-radius: 16px; border: 1px solid #3a4090; display: inline-block; width: 100%; max-width: 400px; text-align: left; }
    h2 { color: #c9a84c; text-align: center; margin-bottom: 20px; }
    .info-row { margin-bottom: 12px; font-size: 16px; }
    .info-row span { color: #fff; font-weight: bold; }
    .btn-group { display: flex; gap: 10px; margin-top: 20px; }
    button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-allow { background: #27ae60; color: white; }
    .btn-deny { background: #e74c3c; color: white; }
    .receipt-img { width: 100%; border-radius: 8px; margin-top: 15px; border: 2px solid #3a4090; display: none; }
    .no-data { text-align: center; color: #ff9f43; font-style: italic; }
  </style>
</head>
<body>

  <div class="card">
    <h2>⚙️ StarLux Admin Panel</h2>
    
    <div id="data-container">
      <div class="info-row">Foydalanuvchi ID: <span id="adm-user-id">0</span></div>
      <div class="info-row">Summa: <span id="adm-amount">0 so'm</span></div>
      
      <p style="margin-top: 15px; font-size: 13px; color: #a0a5d0;">🧾 Kelib tushgan chek surati:</p>
      <div id="img-status" style="color:#aaa; font-size:14px; margin-top:5px;">Rasm yuklanmoqda...</div>
      <img id="adm-receipt" class="receipt-img" alt="Chek rasmi" />
      
      <div class="btn-group">
        <button class="btn-allow" onclick="actionAllow()">✅ Ruxsat berish (+)</button>
        <button class="btn-deny" onclick="actionDeny()">❌ Rad etish</button>
      </div>
    </div>
    
    <div id="no-data-msg" class="no-data" style="display: none;">
      📭 Hozircha yangi to'lov so'rovlari mavjud emas yoki panel toza ochilgan.
    </div>
  </div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  const BOT_TOKEN = "8643227637:AAFyXYCd6Q_nmErLsNB64HCwDsxm6BnmS80";

  // URL parametrlarni o'qib olish
  const urlParams = new URLSearchParams(window.location.search);
  const userId = urlParams.get('user_id') || '0';
  const amount = urlParams.get('amount') || '0';
  const fileId = urlParams.get('file_id') || '';

  if(userId === '0' && amount === '0') {
    document.getElementById('data-container').style.display = 'none';
    document.getElementById('no-data-msg').style.display = 'block';
  } else {
    document.getElementById('adm-user-id').textContent = userId;
    document.getElementById('adm-amount').textContent = parseInt(amount).toLocaleString() + " so'm";
    
    // Telegram file_id orqali haqiqiy rasm linkini aniqlash va ko'rsatsh
    if(fileId) {
      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`)
      .then(res => res.json())
      .then(resData => {
        if(resData.ok) {
          const filePath = resData.result.file_path;
          const fullImgUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${filePath}`;
          const imgEl = document.getElementById('adm-receipt');
          imgEl.src = fullImgUrl;
          imgEl.style.display = 'block';
          document.getElementById('img-status').style.display = 'none';
        } else {
          document.getElementById('img-status').textContent = "⚠️ Rasmni yuklab bo'lmadi.";
        }
      })
      .catch(() => {
        document.getElementById('img-status').textContent = "⚠️ Tarmoq xatosi tufayli rasm yuklanmadi.";
      });
    } else {
      document.getElementById('img-status').textContent = "❌ Chek rasmi mavjud emas.";
    }
  }

  function actionAllow() {
    tg.sendData(`/plus ${userId} ${amount}`);
    tg.close();
  }

  function actionDeny() {
    alert("To'lov so'rovi rad etildi.");
    tg.close();
  }
</script>
</body>
</html>
